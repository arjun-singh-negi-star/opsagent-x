name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    runs-on: ubuntu-latest

    # Real redis:8-alpine — the same image the project actually runs on.
    # This is deliberate: a plain redis (no RediSearch/RedisJSON modules)
    # would let CI pass while the exact "FT._LIST unknown command" bug
    # from earlier in this project's history goes undetected.
    services:
      redis:
        image: redis:8-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      REDIS_URL: redis://localhost:6379/0
      NVIDIA_API_KEY: ci-placeholder-key

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        working-directory: backend
        run: pip install -r requirements.txt

      - name: Run tests
        working-directory: backend
        run: pytest -q

      - name: Build backend Docker image
        working-directory: backend
        run: docker build -t opsagent-x-backend:ci .

  frontend:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Build frontend (type-checks as part of next build)
        working-directory: frontend
        run: npm run build

      - name: Build frontend Docker image
        working-directory: frontend
        run: docker build -t opsagent-x-frontend:ci .
        