apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: opsagent-x
  namespace: opsagent-x
  annotations:
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
spec:
  ingressClassName: nginx
  rules:
    - host: opsagent.yourcompany.com
      http:
        paths:
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: opsagent-backend
                port: { number: 8000 }
          - path: /
            pathType: Prefix
            backend:
              service:
                name: opsagent-frontend
                port: { number: 3000 }
