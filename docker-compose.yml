services:
  redis:
    # Must be Redis 8+ — langgraph-checkpoint-redis needs the RediSearch
    # and RedisJSON modules to create its checkpoint indices, and those
    # ship bundled in core Redis starting with 8.0 (no separate "Stack"
    # image needed).
    image: redis:8-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: ["redis-server", "--save", "60", "1"]

  mongo:
    image: mongo:7
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  backend:
    build: ./backend
    env_file: .env
    ports:
      - "8000:8000"
    depends_on:
      - redis
      - mongo
    volumes:
      # The repo CodeFixer is allowed to branch/patch/commit in. Point this
      # at a real clone of the service(s) you want OpsAgent-X to fix.
      - ./repo-under-management:/repo
      # Docker Desktop's local Kubernetes cluster, exported and edited per
      # the README's "Connecting to a real Kubernetes cluster" section.
      # Comment this out (and unset K8S_KUBECONFIG in .env) if you haven't
      # set this up yet — LogAnalyst just falls back to a clean error.
      - ./kubeconfig-docker-desktop.yaml:/kubeconfig.yaml:ro

  frontend:
    build: ./frontend
    env_file: .env
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  redis_data:
  mongo_data:
